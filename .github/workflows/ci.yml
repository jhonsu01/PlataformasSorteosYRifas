name: CI (validar JSON público)

# Valida en cada push/PR que el JSON publico cumpla el schema y NO exponga
# datos sensibles (privacidad por diseno). Da checks verdes conforme avanza el proyecto.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validar rifa demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar jsonschema
        run: pip install jsonschema

      - name: Validar raffle.json
        run: python execution/validate-schema.py examples/sorteo-demo/public/raffle.json raffle

      - name: Validar numbers.json
        run: python execution/validate-schema.py examples/sorteo-demo/public/numbers.json numbers

  backend-tests:
    name: Backend (memoria + PostgreSQL real)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sorteos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: services/backend
        run: npm ci

      - name: Pruebas (store en memoria + PostgreSQL)
        working-directory: services/backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sorteos_test
          # Valor de prueba: con DATABASE_URL el backend exige un secreto real.
          JWT_ACCESS_SECRET: secreto-solo-para-ci-no-usar-en-produccion
        run: npm test
