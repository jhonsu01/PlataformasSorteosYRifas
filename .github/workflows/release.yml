name: Release (APK + MSI)

# Se dispara al empujar un tag de version (vX.Y.Z).
# Construye el APK (cliente Android) y el MSI (admin Windows), publica UNA sola
# release con los binarios nombrados con el tag, y BORRA las releases anteriores
# (incluido su tag) para que siempre quede solo la ultima.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  build-android:
    name: Build APK (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Decode keystore (si hay secreto)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "Keystore de release listo."
          else
            echo "Sin keystore: se firmara con la clave debug (APK instalable de todos modos)."
          fi

      - name: Build release APK
        working-directory: apps/android
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          gradle assembleRelease \
            -PappVersionName="$VER" \
            -PappVersionCode="${{ github.run_number }}" \
            --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: apps/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    name: Build MSI (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/admin-windows/src-tauri -> target"

      - name: Set version from tag
        shell: bash
        working-directory: apps/admin-windows
        run: |
          VER="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq --arg v "$VER" '.version=$v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json
          # Tambien en Cargo.toml para que app_version() (CARGO_PKG_VERSION) muestre la version real.
          sed -i.bak "s/^version = \".*\"/version = \"$VER\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          echo "Version fijada a $VER"

      - name: Install frontend deps
        working-directory: apps/admin-windows
        run: npm install

      - name: Build Tauri MSI
        working-directory: apps/admin-windows
        run: npm run tauri build -- --bundles msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: apps/admin-windows/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  publish:
    name: Publicar release (solo la ultima)
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Renombrar binarios con el tag
        run: |
          mkdir -p dist
          APK=$(find artifacts -name '*.apk' | head -1)
          MSI=$(find artifacts -name '*.msi' | head -1)
          if [ -z "$APK" ] || [ -z "$MSI" ]; then
            echo "Falta APK o MSI"; exit 1
          fi
          cp "$APK" "dist/SorteosRifas-Cliente-${GITHUB_REF_NAME}.apk"
          cp "$MSI" "dist/SorteosRifas-Admin-${GITHUB_REF_NAME}.msi"
          ls -lh dist

      - name: Borrar releases anteriores (mantener solo la ultima)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          for r in $(gh release list --limit 100 --json tagName --jq '.[].tagName'); do
            if [ "$r" != "$TAG" ]; then
              echo "Borrando release y tag anterior: $r"
              gh release delete "$r" --yes --cleanup-tag || true
            fi
          done

      - name: Crear release actual
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Si ya existe una release para este tag (re-run), la reemplazamos
          # sin borrar el tag que disparo el workflow.
          gh release delete "$TAG" --yes || true
          gh release create "$TAG" \
            --title "Sorteos y Rifas $TAG" \
            --notes "Binarios de la version **$TAG**:
          - \`SorteosRifas-Cliente-$TAG.apk\` — App cliente Android (instalable).
          - \`SorteosRifas-Admin-$TAG.msi\` — App administrador Windows.

          Generado automaticamente por GitHub Actions." \
            "dist/SorteosRifas-Cliente-$TAG.apk" \
            "dist/SorteosRifas-Admin-$TAG.msi"
