<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorteos y Rifas — Administración</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Menu movil: en pantallas angostas (APK) el sidebar es un cajon; este
         boton lo abre y el backdrop lo cierra. En escritorio no se ven. -->
    <button id="menu-toggle" class="menu-toggle oculto" aria-label="Abrir menú">☰</button>
    <div id="backdrop" class="backdrop"></div>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">🎟️</div>
        <div>
          <div class="brand-name">Sorteos y Rifas</div>
          <div class="brand-sub">Administración</div>
        </div>
      </div>
      <nav id="nav">
        <button class="nav-item active" data-view="panel">📊 Panel</button>
        <button class="nav-item" data-view="rifas">🎫 Rifas</button>
        <button class="nav-item" data-view="comprobantes">🧾 Comprobantes</button>
        <button class="nav-item" data-view="ganadores">🏆 Ganadores</button>
        <button class="nav-item" data-view="seguridad">🔐 Seguridad</button>
        <button class="nav-item" data-view="config">⚙️ Configuración</button>
        <button class="nav-item" data-view="apoyo">💜 Apoyo</button>
      </nav>
      <div class="sidebar-foot">
        <div id="user-box" class="user-box"></div>
        <div id="conn-badge" class="conn conn-off">● Backend no conectado</div>
        <div class="ver">v<span id="app-version">—</span></div>
      </div>
    </aside>

    <main class="content">
      <div id="view"><!-- render dinamico --></div>
    </main>

    <!-- Editor de premio y fotos. Vacio hasta que se abre. -->
    <div id="modal" class="modal"></div>

    <div id="toast" class="toast"></div>
    <script src="main.js"></script>
  </body>
</html>
